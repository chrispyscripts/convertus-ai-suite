<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertus AI Suite — Demo</title>
<style>
  :root{
    --green:#3a7d23; --green-d:#2c5f1a; --green-l:#e8f2e3;
    --blue:#1f6f8b; --ink:#1d2421; --muted:#6b7770; --line:#e2e8e0;
    --bg:#f4f7f2; --card:#ffffff; --amber:#c98a00; --red:#c0392b;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 6px 20px rgba(20,40,20,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  a{color:var(--blue)}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  .side{width:248px;background:linear-gradient(180deg,#234d16,#163510);color:#dfeada;
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
  .brand{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.12)}
  .brand h1{font-size:16px;margin:0;letter-spacing:.3px;color:#fff}
  .brand .tag{font-size:11px;color:#a8c79a;margin-top:3px;text-transform:uppercase;letter-spacing:1.5px}
  .nav{padding:10px 8px;flex:1;overflow:auto}
  .nav button{display:flex;gap:10px;align-items:center;width:100%;background:none;border:0;color:#cfe0c6;
    text-align:left;padding:11px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;margin-bottom:2px}
  .nav button:hover{background:rgba(255,255,255,.08);color:#fff}
  .nav button.active{background:#fff;color:var(--green-d);font-weight:600}
  .nav .ico{width:20px;text-align:center;font-size:15px}
  .side .foot{padding:14px 18px;font-size:11px;color:#8fb07f;border-top:1px solid rgba(255,255,255,.12)}
  /* main */
  .main{flex:1;min-width:0}
  .topbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 28px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
  .topbar .demo-pill{background:var(--green-l);color:var(--green-d);font-size:11px;font-weight:600;
    padding:4px 10px;border-radius:20px;border:1px solid #cfe3c4}
  .wrap{padding:28px;max-width:1080px;margin:0 auto}
  h2.page{font-size:22px;margin:0 0 4px}
  p.sub{color:var(--muted);margin:0 0 22px;max-width:680px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:20px;margin-bottom:18px}
  .grid{display:grid;gap:16px}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:820px){.g3,.g2{grid-template-columns:1fr}}
  label.fld{display:block;font-weight:600;font-size:12.5px;margin:0 0 6px;color:#36433b}
  textarea,select,input[type=text]{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;
    font-size:13.5px;font-family:inherit;background:#fcfdfc;color:var(--ink)}
  textarea{min-height:96px;resize:vertical}
  .btn{background:var(--green);color:#fff;border:0;padding:10px 18px;border-radius:8px;font-weight:600;
    cursor:pointer;font-size:13.5px}
  .btn:hover{background:var(--green-d)}
  .btn.sec{background:#fff;color:var(--green-d);border:1px solid var(--green)}
  .btn.ghost{background:#eef3ec;color:#36433b}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .chip{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .chip.g{background:var(--green-l);color:var(--green-d)}
  .chip.a{background:#fdf2dc;color:var(--amber)}
  .chip.r{background:#fbe3e0;color:var(--red)}
  .chip.b{background:#e2f0f4;color:var(--blue)}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
  .stat .n{font-size:26px;font-weight:700;color:var(--green-d)}
  .stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px;
    padding:8px 10px;border-bottom:2px solid var(--line)}
  td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:hover td{background:#fafdf8}
  .out{background:#f8faf6;border:1px dashed #cdddc4;border-radius:10px;padding:16px 18px;margin-top:16px;white-space:pre-wrap;font-size:13.5px;line-height:1.6}
  .out.hide{display:none}
  .src{font-size:11.5px;color:var(--muted);margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
  .src b{color:#36433b}
  .typing{color:var(--muted);font-style:italic}
  .ai-badge{display:inline-flex;gap:6px;align-items:center;font-size:11px;font-weight:600;color:var(--blue);
    background:#e2f0f4;padding:3px 9px;border-radius:20px;margin-bottom:10px}
  .mail{display:flex;gap:12px;padding:12px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:#fcfdfc}
  .mail .av{width:36px;height:36px;border-radius:50%;background:var(--green-l);color:var(--green-d);
    display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
  .mail .body{flex:1;min-width:0}
  .mail .from{font-weight:600}
  .mail .snip{color:var(--muted);font-size:12.5px;margin-top:2px}
  .mail .meta{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .reply{margin-top:10px;background:#f4f9f1;border:1px solid #d8e8cf;border-radius:8px;padding:10px 12px;font-size:12.5px;display:none}
  .bar{height:8px;background:#eef3ec;border-radius:6px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--green)}
  .small{font-size:12px;color:var(--muted)}
  .hl{background:#fff6d6}
  .hidden{display:none}
  .nav .navgrp{font-size:10px;letter-spacing:1.5px;color:#7f9d70;text-transform:uppercase;padding:14px 12px 6px}
  .role-sw{display:flex;gap:8px;align-items:center}
  .role-sw select{padding:7px 10px;border-radius:8px;border:1px solid var(--line);font-weight:600;color:var(--green-d);background:#fff;font-family:inherit}
  .badge{background:var(--red);color:#fff;border-radius:20px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:6px}
  .who{font-size:11px;color:var(--muted);margin-top:2px}
  .msg{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:#fcfdfc}
  .msg.un{border-left:4px solid var(--amber)}
  .msg .h{display:flex;justify-content:space-between;gap:8px;align-items:center}
  .bm-msg{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start;animation:bmin .3s ease}
  .bm-av{width:34px;height:34px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .bm-b{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;flex:1}
  .bm-b .nm{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px}
  @keyframes bmin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><h1>Convertus AI Suite</h1><div class="tag">Internal Demo Build</div></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot">Prototype · simulated AI · sample data only</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div><strong id="crumb">Dashboard</strong><div class="who" id="persona"></div></div>
      <div class="role-sw">
        <span class="small">View as</span>
        <select id="roleSel">
          <option value="ceo">CEO</option>
          <option value="gm">Regional Manager</option>
          <option value="rm">District Sales Manager</option>
        </select>
        <span class="demo-pill">DEMO</span>
      </div>
    </div>
    <div class="wrap" id="view"></div>
  </div>
</div>

<script>
/* ---------- sample data ---------- */
const CONTRACTS = [
  {client:"City of Ottawa", site:"Ottawa, ON", type:"Operate (AD + Compost)", start:"2019-04", renew:"2026-09-30", value:"$14.2M/yr", risk:"amber", note:"Renewal window opens 90 days out. Gate-fee CPI adjustment due July."},
  {client:"City of Surrey", site:"Surrey, BC", type:"Operate (AD/RNG)", start:"2018-01", renew:"2028-12-31", value:"$11.8M/yr", risk:"green", note:"On track. RNG injection volumes exceeding target."},
  {client:"City of London", site:"London, ON", type:"Operate (Compost)", start:"2020-06", renew:"2026-07-15", value:"$6.4M/yr", risk:"red", note:"Renewal in <60 days. Performance report outstanding — penalty clause 7.3 applies."},
  {client:"Halifax Regional Mun.", site:"Halifax, NS", type:"Operate (IVC)", start:"2021-03", renew:"2027-03-31", value:"$5.1M/yr", risk:"green", note:"Stable. Next audit Q1 2027."},
  {client:"Regional District of Nanaimo", site:"Nanaimo, BC", type:"Service + Operate", start:"2022-09", renew:"2026-11-01", value:"$2.3M/yr", risk:"amber", note:"Odour-abatement upgrade milestone due Oct; tied to payment release."},
  {client:"Prince William County", site:"Manassas, VA", type:"Operate (Compost)", start:"2023-05", renew:"2028-05-31", value:"$4.7M/yr", risk:"green", note:"First US site. Compliant with VA DEQ permits."},
  {client:"York Region", site:"York, ON", type:"Design+Build", start:"2024-02", renew:"2027-12-01", value:"$38M (build)", risk:"amber", note:"Commissioning 2027. Milestone 4 (mechanical) drawings pending sign-off."}
];

const KB = [
  {q:"odour abatement spec surrey", a:"The Surrey facility uses a three-stage odour abatement train: an acid (sulphuric) ammonia scrubber, followed by a biofilter sized to 1.2 m bed depth, and a final bio-scrubber polishing stage. Design criterion is <500 OU/m³ at the stack and zero detectable odour at the property line. All process air is captured under negative pressure.", src:["Surrey O&M Manual v4.2 — §6 Air Handling","Design+Build spec sheet: Odour Abatement","ECCC permit BC-2018-0471"]},
  {q:"gate fee escalation clause", a:"Standard municipal operate contracts include an annual gate-fee adjustment tied to Statistics Canada CPI (All-items), applied each contract anniversary. Adjustments above 5% require written client approval (clause 4.2). Ottawa and London follow this template; Surrey uses a fixed 2.5% annual escalator instead.", src:["Master Operate Agreement template §4.2","Ottawa contract amendment 2023-01"]},
  {q:"heat harvest energy savings", a:"Heat Harvest captures thermal energy from the composting/biodrying process and repurposes it for on-site heating and neighbouring facilities. Documented facility energy-consumption reductions range up to ~40% depending on configuration and climate.", src:["Heat Harvest technical brief","London facility energy audit 2024"]},
  {q:"in-vessel composting throughput", a:"In-vessel composting (IVC) tunnels use forced aeration and are fully automated. Typical tunnel cycle is 14–21 days for active phase. Throughput scales modularly; the Halifax site runs configurable tunnels adaptable to seasonal feedstock swings.", src:["Composting & Biodrying process doc","Halifax commissioning report"]}
];

const VENDORS = [
  {c:"Convertus", a:"AIM Environmental", item:"Sulzer pumps & spare parts", conf:96, action:"Merge — same supplier, consolidate for volume pricing"},
  {c:"Convertus", a:"AIM Environmental", item:"Komptech shredders (maintenance)", conf:91, action:"Merge — duplicate maintenance contract, renegotiate single MSA"},
  {c:"Convertus", a:"AIM Environmental", item:"PLC/SCADA support (Siemens)", conf:88, action:"Review — overlapping scope, different rate cards"},
  {c:"Convertus", a:"AIM Environmental", item:"Lab / compost testing services", conf:73, action:"Review — different accredited labs; standardize methods"},
  {c:"Convertus", a:"AIM Environmental", item:"Hauling & logistics (regional)", conf:41, action:"Keep separate — distinct geographies"}
];

const MAILS = [
  {from:"Jennifer Liu", org:"City of Ottawa — Solid Waste", subj:"Q3 diversion figures + renewal questions", snip:"Hi, ahead of our renewal discussion can you send the Q3 tonnage diverted and confirm the gate-fee adjustment for next year?", cat:"Contract/Renewal", catc:"r", route:"→ Corporate / Contracts (Priority)", reply:"Hi Jennifer, thanks for reaching out ahead of the renewal. I've attached the Q3 diversion summary (18,420 t diverted, +6% YoY). The CPI-based gate-fee adjustment for 2027 is calculated at 2.9%, within the standard clause 4.2 threshold. Happy to set up a call next week to walk through the renewal terms. Best regards,"},
  {from:"Marcus Webb", org:"GreenField Logistics", subj:"Partnership / hauling capacity", snip:"We're a regional hauler looking to partner on organics collection in the GTA. Who handles vendor onboarding?", cat:"Vendor / Partnership", catc:"b", route:"→ Procurement", reply:"Hi Marcus, thanks for your interest in partnering with Convertus. I'm routing your note to our procurement team, who manage hauler onboarding and our preferred-vendor list. They'll follow up with our qualification requirements. Regards,"},
  {from:"Sarah Okafor", org:"Resident — Manassas, VA", subj:"Compost availability for residents", snip:"Is the Peak compost you make available for home gardeners to buy locally?", cat:"Product Inquiry", catc:"g", route:"→ Sales / Products", reply:"Hi Sarah, great question! Our Peak and Peak+ compost is available for purchase — I'm connecting you with our products team for local pickup and pricing details at the Manassas facility. Thanks for keeping it local! Best,"},
  {from:"David Chen", org:"ECCC / Regulator", subj:"Annual emissions disclosure reminder", snip:"This is a reminder that your facility GHG disclosure for the 2025 reporting year is due June 30.", cat:"Regulatory / Compliance", catc:"r", route:"→ Corporate / Compliance (Priority)", reply:"Hi David, thank you for the reminder. Our 2025 GHG disclosures for all reporting facilities are on track for submission ahead of the June 30 deadline. Please let me know if you require anything additional in the interim. Regards,"},
  {from:"No-Reply", org:"LinkedIn", subj:"You appeared in 12 searches this week", snip:"See who's viewing your company page...", cat:"Spam / Low priority", catc:"a", route:"→ Archive (no action)", reply:""}
];

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
const view=$("#view");
function aiType(el, text, done){
  el.classList.remove("hide"); el.innerHTML='<span class="typing">AI is drafting…</span>';
  setTimeout(()=>{ let i=0; el.innerHTML="";
    const t=setInterval(()=>{ el.textContent=text.slice(0,i); i+=Math.max(3,Math.round(text.length/90));
      if(i>=text.length){clearInterval(t); el.textContent=text; done&&done();}},14);
  },550);
}
function chip(r){return r==="green"?'<span class="chip g">On track</span>':r==="amber"?'<span class="chip a">Watch</span>':'<span class="chip r">Action needed</span>';}

/* ---------- views ---------- */
const VIEWS={};

VIEWS.home=()=>`
  <h2 class="page">Dashboard</h2>
  <p class="sub">A working prototype of six AI tools tailored to Convertus Group's corporate, sales and admin operations. Everything here runs on sample data to show the workflow — click into any tool from the left.</p>
  <div class="grid g3">
    <div class="stat"><div class="n">7</div><div class="l">Active contracts tracked</div></div>
    <div class="stat"><div class="n">3</div><div class="l">Deadlines needing action</div></div>
    <div class="stat"><div class="n">300M+</div><div class="l">lbs waste diverted (since 2019)</div></div>
  </div>
  <div class="card" style="margin-top:18px">
    <div class="ai-badge">◆ AI briefing</div>
    <div><b>Good morning. Here's what needs your attention today:</b><br><br>
    • <b>London (ON)</b> operate contract renews in under 60 days and the performance report is outstanding — penalty clause 7.3 is in play.<br>
    • <b>Ottawa</b> renewal window opens this week; the gate-fee CPI adjustment (2.9%) is ready to share.<br>
    • <b>ECCC GHG disclosure</b> for 2025 is due June 30 across all reporting facilities.<br>
    • <b>2</b> high-priority emails are waiting in Inbox Triage.</div>
  </div>
  <div class="grid g2">
    ${[['rfp','✎ RFP Co-pilot','Draft municipal bid responses in minutes from your approved boilerplate.'],
       ['kb','⌕ Knowledge Base','Ask a question, get a sourced answer from every contract, SOP and spec.'],
       ['contracts','▦ Contract Tracker','Renewal dates, obligations and penalty clauses, flagged before they bite.'],
       ['esg','♺ ESG Reporting','Generate jurisdiction-specific diversion & emissions reports on demand.'],
       ['aim','⇄ AIM Integration','Reconcile duplicate vendors & contracts from the acquisition.'],
       ['inbox','✉ Inbox Triage','Auto-classify, route and draft replies to inbound mail.'],
       ['tender','📡 Tender Radar','Spot relevant municipal RFPs early and score them for fit.'],
       ['prospect','◎ Prospect Scorer','Rank municipalities by buying signals and auto-draft outreach.'],
       ['roi','∑ Value / ROI Calculator','Show prospects their diversion, emissions and RNG upside.'],
       ['permits','🛡 Permits & Compliance','Digital permits, OHS checks and inspection/cert tracking.'],
       ['safety','⚠ Safety Intelligence','Predictive gas/temp alerts and cross-site incident patterns.'],
       ['contractors','▣ Contractor Sign-In','QR safety acknowledgement, logged across every site.']
      ].map(c=>`<div class="card" style="cursor:pointer" onclick="go('${c[0]}')">
        <strong>${c[1]}</strong><p class="small" style="margin:6px 0 0">${c[2]}</p></div>`).join('')}
  </div>`;

VIEWS.rfp=()=>`
  <h2 class="page">RFP / Proposal Co-pilot</h2>
  <p class="sub">Paste a requirement from a municipal RFP. The co-pilot drafts a first-pass response using Convertus's approved boilerplate, past-performance stats and technology specs — every claim sourced.</p>
  <div class="card">
    <label class="fld">RFP requirement / question</label>
    <textarea id="rfpIn">Describe the proponent's approach to odour control and demonstrated experience operating organic waste facilities for municipalities of comparable size.</textarea>
    <div class="row" style="margin-top:12px">
      <button class="btn" onclick="runRfp()">Generate draft response</button>
      <span class="small">Tone: formal · Library: 142 past bids indexed</span>
    </div>
    <div class="out hide" id="rfpOut"></div>
    <div id="rfpSrc"></div>
  </div>`;

window.runRfp=()=>{
  const txt=`Convertus Group brings a proven, multi-jurisdiction track record in the design, construction and long-term operation of source-separated organic waste facilities for municipalities of comparable and greater scale, including the Cities of Ottawa, Surrey, London and Halifax Regional Municipality.

Approach to odour control:
All process air at our facilities is captured under negative pressure and routed through a multi-stage odour abatement train comprising an acid ammonia scrubber, an engineered biofilter, and a final bio-scrubber polishing stage. Systems are designed to the most stringent applicable criteria (typically <500 OU/m³ at stack with no detectable odour at the property line). Continuous monitoring and our 24/7 control-room oversight allow deviations to be detected and corrected proactively.

Demonstrated experience:
Since 2019 our facilities have diverted over 300 million pounds of organic material from landfill. We currently operate 12+ facilities across Canada and the United States, serving some of North America's largest municipalities under long-term partnership agreements, with documented uptime, diversion and renewable-output performance.`;
  aiType($("#rfpOut"), txt, ()=>{
    $("#rfpSrc").innerHTML=`<div class="src"><b>Sources pulled:</b> Odour Abatement spec sheet · Master Operate Agreement (performance exhibits) · Ottawa & Surrey past-performance records · Corporate diversion KPI (300M+ lbs).
    <br><br><span class="chip b">Draft only — route to proposals lead for review</span></div>`;
  });
};

VIEWS.kb=()=>`
  <h2 class="page">Knowledge Base Search</h2>
  <p class="sub">Institutional knowledge — contracts, O&M manuals, specs, permits — made searchable in plain language. Try: <i>"odour abatement spec Surrey"</i>, <i>"gate fee escalation clause"</i>, <i>"heat harvest energy savings"</i>, <i>"in-vessel composting throughput"</i>.</p>
  <div class="card">
    <div class="row">
      <input type="text" id="kbIn" placeholder="Ask a question…" style="flex:1" onkeydown="if(event.key==='Enter')runKb()">
      <button class="btn" onclick="runKb()">Search</button>
    </div>
    <div class="out hide" id="kbOut"></div>
    <div id="kbSrc"></div>
  </div>`;

window.runKb=()=>{
  const q=($("#kbIn").value||"").toLowerCase();
  let hit=KB.find(k=>k.q.split(" ").filter(w=>q.includes(w)).length>=2) || KB.find(k=>q&&k.q.includes(q.split(" ")[0]));
  if(!q){return;}
  if(!hit){ $("#kbOut").classList.remove("hide"); $("#kbOut").textContent="No indexed document matches that query in this demo. Try one of the suggested questions above."; $("#kbSrc").innerHTML=""; return;}
  aiType($("#kbOut"), hit.a, ()=>{
    $("#kbSrc").innerHTML=`<div class="src"><b>Sources:</b> ${hit.src.join(" · ")}</div>`;
  });
};

VIEWS.contracts=()=>`
  <h2 class="page">Contract & Compliance Tracker</h2>
  <p class="sub">Every operate, service and build contract — with renewal dates, obligations and penalty clauses extracted automatically and flagged before deadlines hit.</p>
  <div class="grid g3" style="margin-bottom:16px">
    <div class="stat"><div class="n" style="color:var(--red)">2</div><div class="l">Renewals in < 90 days</div></div>
    <div class="stat"><div class="n" style="color:var(--amber)">3</div><div class="l">Open milestones / obligations</div></div>
    <div class="stat"><div class="n">$82M+</div><div class="l">Annual contract value tracked</div></div>
  </div>
  <div class="card" style="padding:6px">
    <table><thead><tr><th>Client</th><th>Type</th><th>Value</th><th>Renews</th><th>Status</th></tr></thead><tbody>
    ${CONTRACTS.map((c,i)=>`<tr onclick="cDet(${i})" style="cursor:pointer">
      <td><b>${c.client}</b><br><span class="small">${c.site}</span></td>
      <td>${c.type}</td><td>${c.value}</td><td>${c.renew}</td><td>${chip(c.risk)}</td></tr>`).join('')}
    </tbody></table>
  </div>
  <div class="card hide" id="cDet"></div>`;

window.cDet=(i)=>{
  const c=CONTRACTS[i], el=$("#cDet"); el.classList.remove("hide");
  el.innerHTML=`<div class="ai-badge">◆ AI extract</div>
    <strong>${c.client} — ${c.type}</strong> ${chip(c.risk)}<br>
    <p style="margin:8px 0"><b>Renewal:</b> ${c.renew} &nbsp;·&nbsp; <b>Value:</b> ${c.value} &nbsp;·&nbsp; <b>Since:</b> ${c.start}</p>
    <div class="out" style="margin-top:6px"><b>Flagged:</b> ${c.note}</div>
    <div class="src"><b>Source:</b> ${c.client} master agreement (clauses auto-extracted) · obligation calendar</div>`;
  el.scrollIntoView({behavior:"smooth",block:"nearest"});
};

VIEWS.esg=()=>`
  <h2 class="page">Regulatory & ESG Report Generator</h2>
  <p class="sub">Pull operational data into the exact format each regulator and municipality requires — diversion tonnage, emissions avoided, renewable output — in seconds instead of days.</p>
  <div class="card">
    <div class="grid g2">
      <div><label class="fld">Jurisdiction / template</label>
        <select id="esgJur">
          <option>ECCC — Federal GHG Disclosure (Canada)</option>
          <option>Ontario MECP — Annual Diversion Report</option>
          <option>City of Ottawa — Contract KPI Report</option>
          <option>Virginia DEQ — Facility Compliance (US)</option>
        </select></div>
      <div><label class="fld">Reporting period</label>
        <select id="esgPer"><option>2025 (full year)</option><option>Q1 2026</option><option>FY2024</option></select></div>
    </div>
    <div class="row" style="margin-top:12px"><button class="btn" onclick="runEsg()">Generate report</button>

function qrSVG(){
  // stylised QR (illustrative) with three finder patterns + pseudo-random modules
  const n=21, cell=9; let r="";
  function finder(x,y){r+=`<rect x="${x*cell}" y="${y*cell}" width="${7*cell}" height="${7*cell}" fill="#163510"/><rect x="${(x+1)*cell}" y="${(y+1)*cell}" width="${5*cell}" height="${5*cell}" fill="#fff"/><rect x="${(x+2)*cell}" y="${(y+2)*cell}" width="${3*cell}" height="${3*cell}" fill="#163510"/>`;}
  let s=7;const rand=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    const inFinder=(x<7&&y<7)||(x>n-8&&y<7)||(x<7&&y>n-8);
    if(!inFinder&&rand()>0.55)r+=`<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}" fill="#163510"/>`;
  }
  finder(0,0);finder(n-7,0);finder(0,n-7);
  return `<svg viewBox="0 0 ${n*cell} ${n*cell}" width="200" height="200" style="background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px">${r}</svg>`;
}

function regionRollup(){const regions=[...new Set(SITES_OPS.map(s=>s.region))];
 return regions.map(rg=>{const ss=SITES_OPS.filter(s=>s.region===rg);
  const oee=Math.round(ss.reduce((a,s)=>a+s.oee,0)/ss.length), up=Math.round(ss.reduce((a,s)=>a+s.up,0)/ss.length);
  const st=ss.some(s=>s.margin==='red')?'red':ss.some(s=>s.margin==='amber')?'amber':'green';
  return `<tr><td><b>${rg}</b></td><td>${ss.length}</td><td>${oee}%</td><td>${up}%</td><td>${chip(st)}</td></tr>`;}).join('');}

VIEWS.boardroom=()=>`
 <h2 class="page">Virtual Boardroom</h2>
 <p class="sub">Convene your leadership team's AI agents to deliberate a topic behind the scenes. Each agent argues from its role's live data, then the chair synthesizes a decision brief with recommendation, risks and dissent. Decision-support only — nothing executes without human approval. (You can switch roles top-right; the demo runs the same regardless of who's watching.)</p>
 <div class="card">
  <label class="fld">Agenda topic</label>
  <select id="bmTopic" onchange="bmToggle()">
   <option value="waterloo">Should we pursue the Waterloo tender, and can we deliver it?</option>
   <option value="london">How do we de-risk the London renewal + capacity overrun?</option>
   <option value="acq">Which acquisition target should we prioritize next?</option>
   <option value="custom">✎ Custom topic…</option>
  </select>
  <div id="bmCustomWrap" class="hide" style="margin-top:10px"><label class="fld">Your topic</label><input type="text" id="bmCustom" placeholder="Type any decision for the board to deliberate…"></div>
  <div class="row" style="margin-top:12px"><button class="btn" onclick="convene()">▶ Convene meeting</button>
   <span class="small">Attendees: CEO · Regional Mgr · Sales · CFO · Safety — all AI agents</span></div>
 </div>
 <div id="bmThread" style="margin-top:6px"></div>
 <div id="bmBrief" class="hide"></div>`;
window.bmToggle=()=>{$("#bmCustomWrap").classList.toggle('hide',$("#bmTopic").value!=='custom');};
function bmTurn(turns,i,thread,m){
 if(i>=turns.length){bmBrief(m);return;}
 const tn=turns[i],ag=AGENTS[tn.a],el=document.createElement('div');el.className='bm-msg';
 el.innerHTML=`<div class="bm-av" style="background:${ag.c}">${ag.ini}</div><div class="bm-b"><div class="nm">${ag.n} · ${ag.r}</div><span class="typing">typing…</span></div>`;
 thread.appendChild(el);el.scrollIntoView({behavior:'smooth',block:'nearest'});
 setTimeout(()=>{el.querySelector('.bm-b').innerHTML=`<div class="nm">${ag.n} · ${ag.r}</div>${tn.t}`;
  setTimeout(()=>bmTurn(turns,i+1,thread,m),650);},650);
}
function bmBrief(m){const b=m.brief,el=$("#bmBrief");el.classList.remove('hide');
 el.innerHTML=`<div class="card"><div class="ai-badge">◆ Decision brief — auto-synthesized</div>
  <h3 style="margin:4px 0 10px">${m.topic}</h3>
  <div class="out"><b>Recommendation:</b> ${b.rec}</div>
  <div class="grid g2" style="margin-top:14px">
   <div><strong>Options considered</strong><ul class="small" style="margin:8px 0 0">${b.opts.map(o=>`<li>${o}</li>`).join('')}</ul></div>
   <div><strong>Key risks</strong><ul class="small" style="margin:8px 0 0">${b.risks.map(r=>`<li>${r}</li>`).join('')}</ul></div></div>
  <div class="out" style="margin-top:12px"><b>Dissent noted:</b> ${b.dissent}</div>
  <strong style="display:block;margin-top:14px">Proposed action items</strong>
  <table style="margin-top:8px"><tbody>${b.actions.map(([r,t])=>`<tr><td style="width:170px"><b>${AGENTS[r]?AGENTS[r].n:r}</b></td><td>${t}</td></tr>`).join('')}</tbody></table>
  <div class="row" style="margin-top:14px"><button class="btn" onclick="bmPush()">Push action items to Comms →</button><span class="small" id="bmPushMsg"></span></div>
  <div class="src" style="margin-top:10px">Decision-support only — recommendations require human approval before anything executes. The full transcript above is logged and auditable.</div></div>`;
 el.scrollIntoView({behavior:'smooth',block:'nearest'});}
window.convene=()=>{const sel=$("#bmTopic").value;let m;
 if(sel==='custom'){const t=($("#bmCustom").value||'').trim();if(!t){$("#bmThread").innerHTML='<p class="small">Enter a topic to convene.</p>';return;}m=genericMeeting(t);}
 else m=BOARDROOM[sel];
 BM_CUR=m;const thread=$("#bmThread");thread.innerHTML='';$("#bmBrief").innerHTML='';$("#bmBrief").classList.add('hide');
 bmTurn(m.turns,0,thread,m);};
window.bmPush=()=>{if(!BM_CUR)return;const map={ops:'gm',sales:'rm',cfo:'gm',safety:'gm'};
 const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
 BM_CUR.brief.actions.forEach(([role,txt])=>{const to=map[role]||'gm';MSGS.push({id:Date.now()+Math.floor(Math.random()*1000),from:'ceo',to,pri:'normal',text:`[Boardroom action] ${txt}`,time:now,ack:false});});
 buildNav();$("#bmPushMsg").innerHTML='<span style="color:var(--green-d)">✓ Action items sent to the Comms Center inboxes.</span>';};

/* ---------- router (role-aware) ---------- */
function buildNav(){const r=ROLES[ROLE];
 let h=`<button data-v="home" class="active"><span class="ico">▤</span> ${r.dashLabel}</button>`;
 r.tools.forEach(([grp,ids])=>{h+=`<div class="navgrp">${grp}</div>`;
  ids.forEach(id=>{const t=TOOLS[id];h+=`<button data-v="${id}"><span class="ico">${t.i}</span> ${t.l}${id==='comms'?commsBadge():''}</button>`;});});
 $("#nav").innerHTML=h;}
window.go=(v)=>{
 document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.v===v));
 $("#crumb").textContent = v==='home'?ROLES[ROLE].dashLabel:(TOOLS[v]?TOOLS[v].l:v);
 view.innerHTML = v==='home'?VIEWS[ROLES[ROLE].dash]():VIEWS[v]();
 window.scrollTo(0,0);};
function setRole(r){ROLE=r;$("#persona").textContent=ROLES[r].who;const sel=$("#roleSel");if(sel)sel.value=r;buildNav();go('home');}
function roleFromUrl(){
 const p=location.pathname.toLowerCase().replace(/\/+$/,''),h=location.hash.replace('#','').toLowerCase(),q=(new URLSearchParams(location.search).get('role')||'').toLowerCase();
 if(p.endsWith('/ceo')||h==='ceo'||q==='ceo')return 'ceo';
 if(p.endsWith('/regional')||p.endsWith('/gm')||h==='gm'||q==='gm')return 'gm';
 if(p.endsWith('/sales')||p.endsWith('/rm')||h==='rm'||q==='rm')return 'rm';
 return 'ceo';}
$("#nav").addEventListener("click",e=>{const b=e.target.closest("button");if(b)go(b.dataset.v);});
$("#roleSel").addEventListener("change",e=>{setRole(e.target.value);});
setRole(roleFromUrl());
</script>
</body>
</html>
